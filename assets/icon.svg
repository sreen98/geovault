<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1724"/>
      <stop offset="100%" style="stop-color:#1A2535"/>
    </linearGradient>
    <linearGradient id="pin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Location pin -->
  <g transform="translate(256, 230)">
    <!-- Pin body -->
    <path d="M0,-120 C-66.3,-120 -120,-66.3 -120,0 C-120,66.3 0,160 0,160 C0,160 120,66.3 120,0 C120,-66.3 66.3,-120 0,-120Z" fill="url(#pin)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="-10" r="45" fill="#0F1724"/>
    <!-- Dot -->
    <circle cx="0" cy="-10" r="18" fill="#34D399"/>
  </g>
  <!-- Shield/vault accent -->
  <path d="M256,370 L256,390" stroke="#34D399" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M240,385 L256,400 L272,385" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
</svg>
